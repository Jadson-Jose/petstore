<header>
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="contact-info">
                <a href="tel:+5511999999999"><i class="fas fa-phone"></i> (11) 99999-9999</a>
                <a href="mailto:contato@petshop.com"><i class="fas fa-envelope"></i> contato@petshop.com</a>
            </div>
            <div class="auth-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}"><i class="fas fa-user"></i> Minha Conta</a>
                    <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Sair</a>
                {% else %}
                    <a href="{% url 'login' %}"><i class="fas fa-user"></i> Entrar</a>
                    <a href="{% url 'register' %}"><i class="fas fa-user-plus"></i> Cadastrar</a>
                {% endif %}
                <a href="{% url 'wishlist' %}"><i class="fas fa-heart"></i> Favoritos</a>
            </div>
        </div>
    </div>
    
    <div class="main-header">
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/logo.svg' %}" alt="PetPremium Logo">
                <h1>Pet<span>Premium</span></h1>
            </a>
        </div>
        
        <div class="search-cart">
            <form class="search-bar" method="GET" action="{% url 'product_list' %}">
                <input type="text" name="q" placeholder="Buscar produtos para seu pet..." value="{{ request.GET.q }}">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
            <a href="{% url 'cart' %}" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">{{ cart_items_count }}</span>
            </a>
        </div>
    </div>
    
    {% include 'includes/navigation.html' %}
</header>
